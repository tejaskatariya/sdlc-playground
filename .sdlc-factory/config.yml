# sdlc-factory configuration — the FSM engine reads this on every command.
repo: tejaskatariya/sdlc-playground
connector: github

# Per-gate approver allowlists (GitHub logins). Machine accounts are NEVER
# honored at a gate, even if listed. The merge gate reuses the review allowlist.
gates:
  plan:
    - tejaskatariya
  review:
    - tejaskatariya

# Personas, not separate GitHub accounts: these logins are used as the issue
# assignee while that persona's session runs (the claim lock). Defaults to
# the user who installed the package; both may be the same login.
bots:
  dev: tejaskatariya
  reviewer: tejaskatariya

# Max stories advanced per autonomous pass (sdlc-factory run).
concurrency: 1

# Watchdog rule 1: heartbeat timeout per stage, hours.
timeoutsHours:
  plan: 1
  implement: 4
  review: 1
  merge: 1

# Watchdog rule 2: queued-with-open-deps age before the one-time ops flag, hours.
starvationHours: 24

logsDir: logs

# Every file the pipeline's dev sessions generate lives under this folder;
# the reviewer treats changes outside it as a defect.
generatedCodeDir: sdlc-generated-code

# Feature artifact folders (<artifactsDir>/<feature>/spec.md, tech-spec.md,
# tasks.md) authored via /sdlc-define live under this directory.
artifactsDir: artifacts

# Defined in the design but disabled by convention during the proving-ground
# phase: every story gates through a human.
fastTrack: false
