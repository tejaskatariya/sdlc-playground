name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build and test
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build
          else
            echo "No Gradle project yet — bootstrap pass"
          fi
